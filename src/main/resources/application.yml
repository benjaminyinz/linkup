server:
  port: ${SERVER_PORT:8080} # 后端服务端口，默认 8080

spring:
  application:
    name: linkup

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # 默认启动开发环境配置

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver

  # 开启 Java 21 虚拟线程，提升高并发场景下的线程调度效率
  threads:
    virtual:
      enabled: true

  # Flyway 数据库迁移：所有 schema 变更走 src/main/resources/db/migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # 接入已有数据库时不报错
    baseline-version: 0
    validate-on-migrate: true

  # Redis：JWT 黑名单、缓存、分布式锁、限流、幂等键
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

# MyBatis-Plus 公共配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml # XML 映射文件位置
  type-aliases-package: com.linkup.**.entity # 业务实体扫描通配路径
  configuration:
    map-underscore-to-camel-case: true # 自动将下划线字段映射为驼峰属性
  global-config:
    db-config:
      logic-delete-field: deleted     # 逻辑删除字段名（entity 用 @TableLogic 标注）
      logic-delete-value: true
      logic-not-delete-value: false

# LinkUp 项目自定义配置
linkup:
  jwt:
    issuer: ${JWT_ISSUER:linkup} # JWT 签发方，用来标识 token 是 LinkUp 后端签发的
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:43200} # access token 有效期，默认 30 天

# Knife4j / OpenAPI 接口文档配置
knife4j:
  enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
